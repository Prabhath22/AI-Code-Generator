<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Project Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6fcd;
    --accent2: #4fd1c5;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #4fd1c5;
    --error: #fc8181;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,111,205,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,111,205,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,111,205,0.08) 0%, transparent 70%);
    top: -200px;
    right: -200px;
    pointer-events: none;
    z-index: 0;
  }

  .glow2 {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(79,209,197,0.06) 0%, transparent 70%);
    bottom: -100px;
    left: -100px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 60px 24px;
    position: relative;
    z-index: 1;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(124,111,205,0.1);
    border: 1px solid rgba(124,111,205,0.2);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 24px;
    letter-spacing: 0.08em;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  h1 {
    font-size: clamp(36px, 6vw, 58px);
    font-weight: 800;
    line-height: 1.05;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 52px;
  }

  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
  }

  .field { margin-bottom: 20px; }

  input, textarea, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 12px;
  }

  textarea { min-height: 100px; }

  .btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #5a4fb5);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status {
    margin-top: 15px;
  }
</style>
</head>
<body>

<div class="glow"></div>
<div class="glow2"></div>

<div class="container">

  <div class="badge">AI Project Generator</div>

  <h1>Build any project<br><span>with AI code</span></h1>
  <p class="subtitle">Generate working code instantly.</p>

  <div class="form-card">

    <input type="text" id="title" placeholder="Project Title">

    <textarea id="description" placeholder="Describe your project"></textarea>

    <select id="format">
      <option value="py">.py</option>
      <option value="txt">.txt</option>
    </select>

    <button class="btn" onclick="generate()">Generate Code</button>

    <div class="status" id="status"></div>

  </div>

</div>

<script>
const WEBHOOK_URL = "https://prabhath22.app.n8n.cloud/webhook/solve";

async function generate() {
  const title = document.getElementById('title').value;
  const description = document.getElementById('description').value;
  const format = document.getElementById('format').value;
  const status = document.getElementById('status');

  status.innerText = "Generating...";

  try {
    const response = await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ title, description })
    });

    const blob = await response.blob();

    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = title.replace(/\s+/g, "_") + "." + format;
    a.click();

    status.innerText = "Download started ✅";

  } catch (error) {
    status.innerText = "Error ❌";
  }
}
</script>

</body>
</html>
